<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clawd Mascot Studio</title>
  <style>
    :root {
      --color-background-primary: #1c1c1e;
      --color-background-secondary: #2c2c2e;
      --color-border-tertiary: #3a3a3c;
      --color-border-secondary: #48484a;
      --color-text-primary: #f2f2f7;
      --color-text-secondary: #aeaeb2;
      --border-radius-lg: 14px;
      --border-radius-md: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .studio { display: flex; gap: 24px; max-width: 700px; width: 100%; }
    .stage { flex: 0 0 300px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .canvas-wrap { width: 260px; height: 290px; background: var(--color-background-secondary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; justify-content: center; }

    @media (max-width: 560px) {
      body { padding: 1.25rem; align-items: flex-start; }
      .studio { flex-direction: column; align-items: center; }
      .stage { flex: none; width: 100%; }
      .controls { width: 100%; }
    }
    .controls { flex: 1; display: flex; flex-direction: column; gap: 18px; min-width: 0; }
    .ctrl-group label { font-size: 12px; color: var(--color-text-secondary); display: block; margin-bottom: 7px; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 5px; }
    .chip { padding: 4px 11px; font-size: 12px; border: 0.5px solid var(--color-border-secondary); border-radius: 99px; cursor: pointer; background: var(--color-background-primary); color: var(--color-text-primary); transition: background 0.12s, color 0.12s; white-space: nowrap; font-family: inherit; }
    .chip.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
    .chip:hover:not(.active) { background: var(--color-background-secondary); }
    .divider { height: 0.5px; background: var(--color-border-tertiary); }
    #clawd-svg { width: 220px; height: 270px; overflow: visible; }
    .action-btn { display: flex; align-items: center; gap: 6px; padding: 6px 14px; font-size: 12px; border: 0.5px solid var(--color-border-secondary); border-radius: 99px; cursor: pointer; background: var(--color-background-primary); color: var(--color-text-primary); transition: background 0.12s, color 0.12s; font-family: inherit; }
    .action-btn:hover { background: var(--color-background-secondary); }
    .action-btn.success { background: var(--color-text-primary); color: var(--color-background-primary); }
    .btn-row { display: flex; gap: 8px; }
  </style>
</head>
<body>
<div class="studio">
  <div class="stage">
    <div class="canvas-wrap">
      <svg id="clawd-svg" viewBox="0 0 200 260" overflow="visible" xmlns="http://www.w3.org/2000/svg">
        <g id="clawd-group">
          <path id="body-path" transform="translate(4,30) scale(8)" clip-rule="evenodd" d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949zM6 10.949h1.488V8.102H6v2.847zm10.51 0H18V8.102h-1.49v2.847z" fill="#D97757" fill-rule="evenodd"/>
          <rect id="eyebg-l" x="52" y="93" width="12" height="25" fill="#D97757"/>
          <rect id="eyebg-r" x="136" y="93" width="12" height="25" fill="#D97757"/>
          <g id="eye-l"><rect x="52" y="95" width="12" height="23" fill="#1a0f08"/></g>
          <g id="eye-r"><rect x="136" y="95" width="12" height="23" fill="#1a0f08"/></g>
          <rect id="lid-l" x="52" y="95" width="12" height="0" fill="#D97757"/>
          <rect id="lid-r" x="136" y="95" width="12" height="0" fill="#D97757"/>
          <g id="acc-layer"></g>
        </g>
      </svg>
    </div>
    <div class="btn-row">
      <button id="copy-btn" class="action-btn" onclick="copyMascot()">&#128203; Copy image</button>
      <button class="action-btn" onclick="resetAll()">&#8635; Reset</button>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-group">
      <label>Hats</label>
      <div class="chip-row">
        <button id="def-hat" class="chip active" onclick="setAcc('none',this)">None</button>
        <button class="chip" onclick="setAcc('tophat',this)">Top hat</button>
        <button class="chip" onclick="setAcc('party',this)">Party hat</button>
        <button class="chip" onclick="setAcc('beret',this)">Beret</button>
        <button class="chip" onclick="setAcc('cap',this)">Cap</button>
        <button class="chip" onclick="setAcc('halo',this)">Halo</button>
        <button class="chip" onclick="setAcc('crown',this)">Crown</button>
      </div>
    </div>
    <div class="divider"></div>
    <div class="ctrl-group">
      <label>Devices &amp; props</label>
      <div class="chip-row">
        <button id="def-device" class="chip active" onclick="setDevice('none',this)">None</button>
        <button class="chip" onclick="setDevice('laptop',this)">Laptop</button>
        <button class="chip" onclick="setDevice('phone',this)">Phone</button>
        <button class="chip" onclick="setDevice('coffee',this)">Coffee</button>
        <button class="chip" onclick="setDevice('book',this)">Book</button>
        <button class="chip" onclick="setDevice('mic',this)">Mic</button>
      </div>
    </div>
    <div class="divider"></div>
    <div class="ctrl-group">
      <label>Mood</label>
      <div class="chip-row">
        <button id="def-mood" class="chip active" onclick="setMood('normal',this)">Normal</button>
        <button class="chip" onclick="setMood('happy',this)">Happy</button>
        <button class="chip" onclick="setMood('sleepy',this)">Sleepy</button>
        <button class="chip" onclick="setMood('cool',this)">Cool</button>
      </div>
    </div>
    <div class="divider"></div>
    <div class="ctrl-group">
      <label>Animation</label>
      <div class="chip-row">
        <button id="def-anim" class="chip active" onclick="setAnim('idle',this)">Idle</button>
        <button class="chip" onclick="setAnim('excited',this)">Excited</button>
        <button class="chip" onclick="setAnim('wave',this)">Wave</button>
        <button class="chip" onclick="setAnim('blink',this)">Blink</button>
        <button class="chip" onclick="setAnim('spin',this)">Spin</button>
      </div>
    </div>
  </div>
</div>

<script>
const svg = document.getElementById('clawd-svg');
let raf;
const q = id => document.getElementById(id);

function setActiveIn(el) { el.closest('.chip-row').querySelectorAll('.chip').forEach(e=>e.classList.remove('active')); el.classList.add('active'); }

function resetAll() {
  setAnim('idle',q('def-anim'));
  setAcc('none',q('def-hat'));
  setDevice('none',q('def-device'));
  setMood('normal',q('def-mood'));
}

async function copyMascot() {
  const btn=q('copy-btn'); btn.textContent='Copying…';
  const clone=svg.cloneNode(true); const pad=32,vbW=200+pad*2,vbH=265,scale=3;
  clone.setAttribute('viewBox',`${-pad} 0 ${vbW} ${vbH}`); clone.setAttribute('width',vbW*scale); clone.setAttribute('height',vbH*scale); clone.removeAttribute('style');
  clone.querySelector('#clawd-group')?.setAttribute('transform',q('clawd-group').getAttribute('transform')||'');
  const url=URL.createObjectURL(new Blob([new XMLSerializer().serializeToString(clone)],{type:'image/svg+xml;charset=utf-8'}));
  const img=new Image();
  img.onload=async()=>{ const canvas=document.createElement('canvas'); canvas.width=vbW*scale; canvas.height=vbH*scale; canvas.getContext('2d').drawImage(img,0,0); URL.revokeObjectURL(url);
    canvas.toBlob(async pngBlob=>{ try{ await navigator.clipboard.write([new ClipboardItem({'image/png':pngBlob})]); btn.textContent='✓ Copied!'; btn.classList.add('success'); }catch{ btn.textContent='✗ Failed'; } setTimeout(()=>{ btn.textContent='📋 Copy image'; btn.classList.remove('success'); },2000); },'image/png'); };
  img.src=url;
}

const EYE_DASH = {
  l: `<rect x="52" y="95" width="12" height="23" fill="#1a0f08"/>`,
  r: `<rect x="136" y="95" width="12" height="23" fill="#1a0f08"/>`
};
const EYE_HAPPY = {
  l: `<path d="M53,101 L63,106.5 L53,112" fill="none" stroke="#1a0f08" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`,
  r: `<path d="M147,101 L137,106.5 L147,112" fill="none" stroke="#1a0f08" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`
};

function setEyeShape(s) { const m=s==='happy'?EYE_HAPPY:EYE_DASH; q('eye-l').innerHTML=m.l; q('eye-r').innerHTML=m.r; }
function resetEyes() { setEyeShape('dash'); setLids(0); showEyes(true); }
function setLids(h) { ['lid-l','lid-r'].forEach(id=>q(id).setAttribute('height',h)); }
function showEyes(v) { ['eye-l','eye-r','eyebg-l','eyebg-r'].forEach(id=>q(id).style.opacity=v?'1':'0'); }

function clearAnim(){cancelAnimationFrame(raf);q('clawd-group').setAttribute('transform','');svg.style.transform='';q('temp-arm')?.remove();resetEyes();}
function setAnim(name,btn){if(btn)setActiveIn(btn);clearAnim();({idle:startIdle,excited:startExcited,wave:startWave,blink:startBlink,spin:startSpin})[name]?.();}
function startIdle(){let t=0;(function l(){t+=0.033;q('clawd-group').setAttribute('transform',`translate(0,${(Math.sin(t)*3).toFixed(2)})`);raf=requestAnimationFrame(l);})();}
function startExcited(){let t=0;(function l(){t+=0.08;const b=(-Math.abs(Math.sin(t))*7).toFixed(2),sx=(1+Math.abs(Math.sin(t))*0.04).toFixed(3);q('clawd-group').setAttribute('transform',`translate(0,${b}) scale(${sx},${(1/sx).toFixed(3)})`);raf=requestAnimationFrame(l);})();}
function startWave(){let t=0;const g=document.createElementNS('http://www.w3.org/2000/svg','g');g.id='temp-arm';g.innerHTML=`<rect x="172" y="114" width="28" height="28" rx="3" fill="#D97757"/>`;q('acc-layer').prepend(g);(function l(){t+=0.075;q('clawd-group').setAttribute('transform',`translate(0,${(Math.sin(t*0.5)*2).toFixed(2)})`);g.setAttribute('transform',`rotate(${(Math.sin(t)*22-8).toFixed(1)},196,128)`);raf=requestAnimationFrame(l);})();}
function startBlink(){let t=0,bt=0;(function l(){t+=0.033;bt++;q('clawd-group').setAttribute('transform',`translate(0,${(Math.sin(t)*2).toFixed(2)})`);setLids(bt>100&&bt<108?23:0);if(bt>130)bt=0;raf=requestAnimationFrame(l);})();}
function startSpin(){let d=0;(function l(){d=(d+3)%360;svg.style.transform=`rotate(${d}deg)`;svg.style.transformOrigin='100px 130px';raf=requestAnimationFrame(l);})();}

function setMood(mood,btn){
  if(btn)setActiveIn(btn); q('sunglasses')?.remove(); resetEyes();
  if(mood==='happy'){ setEyeShape('happy'); }
  else if(mood==='sleepy'){ setLids(14); }
  else if(mood==='cool'){ showEyes(false); const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.id='sunglasses'; g.innerHTML=`<rect x="49" y="97" width="18" height="22" rx="2" fill="#111" opacity="0.92"/><rect x="133" y="97" width="18" height="22" rx="2" fill="#111" opacity="0.92"/><line x1="67" y1="108" x2="133" y2="108" stroke="#333" stroke-width="3"/><line x1="16" y1="106" x2="49" y2="108" stroke="#333" stroke-width="2.5"/><line x1="151" y1="108" x2="184" y2="106" stroke="#333" stroke-width="2.5"/>`; q('acc-layer').appendChild(g); }
}

function setAcc(name,btn){
  if(btn)setActiveIn(btn); q('acc-layer').querySelector('.hat')?.remove(); if(name==='none')return;
  const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','hat');
  const H={tophat:`<rect x="64" y="26" width="72" height="48" rx="2" fill="#1a1a1a"/><rect x="50" y="72" width="100" height="10" rx="2" fill="#1a1a1a"/><rect x="66" y="30" width="68" height="5" rx="1" fill="#D97757" opacity="0.65"/>`,party:`<polygon points="100,4 62,72 138,72" fill="#e84393"/><polygon points="100,4 62,72 81,72" fill="#f5a623" opacity="0.55"/><polygon points="100,4 119,72 138,72" fill="#7c3aed" opacity="0.55"/><line x1="62" y1="72" x2="138" y2="72" stroke="#f5a623" stroke-width="3"/><circle cx="100" cy="6" r="5" fill="#f5a623"/><circle cx="82" cy="40" r="3" fill="white" opacity="0.7"/><circle cx="118" cy="44" r="3" fill="white" opacity="0.7"/>`,beret:`<ellipse cx="100" cy="72" rx="54" ry="13" fill="#b02020"/><ellipse cx="106" cy="62" rx="48" ry="17" fill="#d42828"/><circle cx="130" cy="57" r="7" fill="#b02020"/>`,cap:`<ellipse cx="100" cy="74" rx="56" ry="12" fill="#2563eb"/><rect x="58" y="54" width="84" height="22" rx="7" fill="#2563eb"/><rect x="40" y="72" width="34" height="6" rx="2" fill="#1d4ed8"/><rect x="76" y="57" width="50" height="8" rx="2" fill="#1d4ed8" opacity="0.38"/>`,halo:`<ellipse cx="100" cy="52" rx="44" ry="9" fill="none" stroke="#f5a623" stroke-width="5"/><ellipse cx="100" cy="52" rx="44" ry="9" fill="none" stroke="#fde68a" stroke-width="2" opacity="0.5"/>`,crown:`<polygon points="56,72 56,42 70,56 84,36 96,52 100,36 104,52 116,36 130,56 144,42 144,72" fill="#f5a623"/><rect x="56" y="63" width="88" height="10" rx="2" fill="#e08c0f"/><circle cx="80" cy="48" r="5" fill="#e84393"/><circle cx="100" cy="42" r="5" fill="#e84393"/><circle cx="120" cy="48" r="5" fill="#e84393"/>`};
  g.innerHTML=H[name]||''; q('acc-layer').insertBefore(g,q('acc-layer').firstChild);
}

const D = {
  laptop: `<g shape-rendering="crispEdges"><rect x="40" y="192" width="120" height="4" fill="#111827"/><rect x="40" y="192" width="4" height="52" fill="#111827"/><rect x="156" y="192" width="4" height="52" fill="#111827"/><rect x="40" y="240" width="120" height="4" fill="#111827"/><rect x="44" y="196" width="112" height="44" fill="#0c1a2e"/><rect x="52" y="204" width="4" height="4" fill="#e87340"/><rect x="60" y="204" width="4" height="4" fill="#e87340"/><rect x="56" y="200" width="4" height="4" fill="#e87340"/><rect x="56" y="208" width="4" height="4" fill="#e87340"/><rect x="68" y="204" width="24" height="4" fill="#34d399"/><rect x="96" y="204" width="8" height="4" fill="#60a5fa"/><rect x="108" y="204" width="16" height="4" fill="#f59e0b"/><rect x="52" y="212" width="8" height="4" fill="#60a5fa"/><rect x="64" y="212" width="20" height="4" fill="#a78bfa"/><rect x="88" y="212" width="12" height="4" fill="#34d399"/><rect x="52" y="220" width="8" height="4" fill="#60a5fa"/><rect x="64" y="220" width="4" height="4" fill="#f8fafc" opacity="0.85"/><rect x="52" y="228" width="16" height="4" fill="#e87340" opacity="0.5"/><rect x="36" y="244" width="128" height="8" fill="#1f2937"/><rect x="40" y="244" width="120" height="6" fill="#374151"/><rect x="44" y="244" width="4" height="4" fill="#4b5563"/><rect x="52" y="244" width="4" height="4" fill="#4b5563"/><rect x="60" y="244" width="4" height="4" fill="#4b5563"/><rect x="68" y="244" width="4" height="4" fill="#4b5563"/><rect x="76" y="244" width="4" height="4" fill="#4b5563"/><rect x="84" y="244" width="4" height="4" fill="#4b5563"/><rect x="92" y="244" width="4" height="4" fill="#4b5563"/><rect x="100" y="244" width="4" height="4" fill="#4b5563"/><rect x="108" y="244" width="4" height="4" fill="#4b5563"/><rect x="116" y="244" width="4" height="4" fill="#4b5563"/><rect x="124" y="244" width="4" height="4" fill="#4b5563"/><rect x="132" y="244" width="4" height="4" fill="#4b5563"/><rect x="80" y="248" width="40" height="4" fill="#1f2937"/><rect x="44" y="240" width="112" height="4" fill="#111827"/></g>`,
  phone: `<g shape-rendering="crispEdges"><rect x="170" y="102" width="36" height="64" fill="#111827"/><rect x="174" y="106" width="28" height="56" fill="#1f2937"/><rect x="174" y="110" width="28" height="44" fill="#0c1a2e"/><rect x="180" y="107" width="4" height="2" fill="#374151"/><rect x="186" y="107" width="4" height="2" fill="#374151"/><rect x="192" y="107" width="4" height="2" fill="#374151"/><rect x="176" y="114" width="8" height="8" fill="#7c3aed"/><rect x="188" y="114" width="8" height="8" fill="#2563eb"/><rect x="176" y="126" width="8" height="8" fill="#059669"/><rect x="188" y="126" width="8" height="8" fill="#dc2626"/><rect x="176" y="114" width="2" height="2" fill="#a78bfa" opacity="0.6"/><rect x="188" y="114" width="2" height="2" fill="#60a5fa" opacity="0.6"/><rect x="176" y="126" width="2" height="2" fill="#34d399" opacity="0.6"/><rect x="188" y="126" width="2" height="2" fill="#f87171" opacity="0.6"/><rect x="176" y="138" width="24" height="2" fill="#374151"/><rect x="176" y="142" width="16" height="2" fill="#374151"/><rect x="182" y="154" width="12" height="3" fill="#374151"/><rect x="166" y="114" width="4" height="8" fill="#374151"/><rect x="166" y="126" width="4" height="8" fill="#374151"/><rect x="206" y="118" width="4" height="12" fill="#374151"/></g>`,
  coffee: `<g shape-rendering="crispEdges"><rect x="-4" y="94" width="4" height="4" fill="#9ca3af" opacity="0.5"/><rect x="0" y="90" width="4" height="4" fill="#9ca3af" opacity="0.4"/><rect x="-4" y="86" width="4" height="4" fill="#9ca3af" opacity="0.3"/><rect x="10" y="94" width="4" height="4" fill="#9ca3af" opacity="0.5"/><rect x="14" y="90" width="4" height="4" fill="#9ca3af" opacity="0.4"/><rect x="10" y="86" width="4" height="4" fill="#9ca3af" opacity="0.3"/><rect x="-12" y="102" width="44" height="4" fill="#9ca3af"/><rect x="-12" y="106" width="4" height="36" fill="#d1d5db"/><rect x="-8" y="106" width="36" height="36" fill="#f3f4f6"/><rect x="28" y="106" width="4" height="36" fill="#d1d5db"/><rect x="-12" y="142" width="44" height="4" fill="#9ca3af"/><rect x="32" y="112" width="4" height="4" fill="#9ca3af"/><rect x="36" y="116" width="4" height="16" fill="#d1d5db"/><rect x="32" y="132" width="4" height="4" fill="#9ca3af"/></g>`,
  book: `<g shape-rendering="crispEdges"><rect x="-18" y="108" width="12" height="64" fill="#4c1d95"/><rect x="-18" y="108" width="4" height="64" fill="#5b21b6"/><rect x="-6" y="108" width="48" height="64" fill="#7c3aed"/><rect x="-18" y="108" width="60" height="4" fill="#6d28d9"/><rect x="-18" y="168" width="60" height="4" fill="#4c1d95"/><rect x="-6" y="108" width="8" height="4" fill="#8b5cf6"/><rect x="-2" y="116" width="32" height="4" fill="#ddd6fe"/><rect x="-2" y="124" width="24" height="4" fill="#ddd6fe"/><rect x="-2" y="132" width="40" height="2" fill="#6d28d9"/><rect x="-2" y="138" width="40" height="2" fill="#a78bfa" opacity="0.55"/><rect x="-2" y="144" width="40" height="2" fill="#a78bfa" opacity="0.55"/><rect x="-2" y="150" width="40" height="2" fill="#a78bfa" opacity="0.55"/><rect x="-2" y="156" width="32" height="2" fill="#a78bfa" opacity="0.55"/><rect x="-2" y="162" width="24" height="2" fill="#a78bfa" opacity="0.55"/><rect x="-14" y="124" width="4" height="4" fill="#6d28d9"/><rect x="-14" y="140" width="4" height="4" fill="#6d28d9"/><rect x="-14" y="156" width="4" height="4" fill="#6d28d9"/><rect x="42" y="112" width="4" height="56" fill="#c4b5fd" opacity="0.3"/></g>`,
  mic: `<g shape-rendering="crispEdges"><rect x="180" y="88" width="12" height="4" fill="#9ca3af"/><rect x="178" y="92" width="16" height="4" fill="#6b7280"/><rect x="174" y="96" width="24" height="28" fill="#374151"/><rect x="174" y="96" width="4" height="28" fill="#4b5563"/><rect x="178" y="100" width="16" height="2" fill="#6b7280"/><rect x="178" y="106" width="16" height="2" fill="#6b7280"/><rect x="178" y="112" width="16" height="2" fill="#6b7280"/><rect x="178" y="118" width="16" height="2" fill="#6b7280"/><rect x="178" y="124" width="16" height="4" fill="#6b7280"/><rect x="182" y="128" width="8" height="8" fill="#4b5563"/><rect x="178" y="136" width="4" height="12" fill="#374151"/><rect x="190" y="136" width="4" height="12" fill="#374151"/><rect x="174" y="136" width="4" height="4" fill="#374151"/><rect x="194" y="136" width="4" height="4" fill="#374151"/><rect x="170" y="140" width="4" height="8" fill="#374151"/><rect x="198" y="140" width="4" height="8" fill="#374151"/><rect x="170" y="148" width="32" height="4" fill="#374151"/><rect x="166" y="152" width="40" height="4" fill="#4b5563"/><rect x="170" y="156" width="32" height="4" fill="#374151"/><rect x="184" y="96" width="4" height="4" fill="#dc2626"/></g>`
};

function setDevice(name,btn){
  if(btn)setActiveIn(btn); q('acc-layer').querySelector('.device')?.remove(); if(name==='none')return;
  const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','device');
  g.innerHTML=D[name]||''; q('acc-layer').appendChild(g);
}

startIdle();
</script>
</body>
</html>
